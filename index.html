    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #f8ffff; color: #1e293b; overflow-x: hidden; }

        .product-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 1rem; }
        .card { 
            background: white; 
            border-radius: 1.5rem; 
            padding: 0.75rem; 
            border: 1px solid #e2e8f0; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);

        .icon-circle { width: 55px; height: 55px; background-color: #ccfbf1; border-radius: 99px; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 26px; transition: all 0.3s ease; }
        .icon-circle:hover { transform: scale(1.1) rotate(10deg); }
        @keyframes heartBeat { 0% { transform: scale(1); } 14% { transform: scale(1.1); } 28% { transform: scale(1); } 42% { transform: scale(1.1); } 70% { transform: scale(1); } }
        .heartbeat-anim { animation: heartBeat 2s infinite; }
    </style>
</head>
